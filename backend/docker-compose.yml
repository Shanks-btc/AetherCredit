services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       aethercredit
      POSTGRES_USER:     aethercredit
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aethercredit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: